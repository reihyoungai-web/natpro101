<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ASNP NATPRO10 in JEJU Island</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 초기화면 (타이틀 스크린) -->
    <div id="title-screen" class="screen active">
        <canvas id="title-canvas"></canvas>
        <div class="title-content">
            <h1 class="game-title">ASNP NATPRO10<br><span>in JEJU island</span></h1>
            <p class="touch-text blink">touch to throw</p>
        </div>
        <div class="sound-toggle" id="sound-toggle">🔊</div>
    </div>

    <!-- 이메일 입력 화면 -->
    <div id="email-screen" class="screen">
        <div class="email-container">
            <h2 class="pixel-title">Enter Your Email</h2>
            <p class="pixel-subtitle">게임 결과를 저장하기 위해<br>이메일을 입력해주세요</p>
            <input type="email" id="email-input" class="pixel-input" placeholder="your@email.com" autocomplete="email">
            <button id="start-game-btn" class="pixel-button">START GAME</button>
            <p class="error-message" id="email-error"></p>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="screen">
        <canvas id="game-canvas"></canvas>
        <div class="game-ui">
            <div class="score-display">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">0</span>
            </div>
        </div>
    </div>

    <!-- 게임 오버 / 랭킹 화면 -->
    <div id="ranking-screen" class="screen">
        <div class="ranking-container">
            <h2 class="pixel-title">GAME OVER</h2>
            <div class="final-score">
                <span>YOUR SCORE</span>
                <span id="final-score-value">0</span>
            </div>
            <div class="ranking-board">
                <h3>🏆 TOP 10 RANKING 🏆</h3>
                <div id="ranking-list"></div>
            </div>
            <button id="restart-btn" class="pixel-button">PLAY AGAIN</button>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
